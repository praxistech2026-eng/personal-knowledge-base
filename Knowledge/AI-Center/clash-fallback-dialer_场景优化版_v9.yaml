  domain-mrs: &domain-mrs
    type: http
    interval: 86400
    behavior: domain
    format: mrs

  ip-mrs: &ip-mrs
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  classical: &classical
    type: http
    interval: 86400
    behavior: classical
    format: text

