# ========================
# 规则
# ========================
rules:
  # ===== 本地与国内直连 =====
  - IP-CIDR,10.0.0.0/8,直连,no-resolve
  - IP-CIDR,172.16.0.0/12,直连,no-resolve
  - IP-CIDR,192.168.0.0/16,直连,no-resolve
  - IP-CIDR,127.0.0.0/8,直连,no-resolve
  - IP-CIDR,169.254.0.0/16,直连,no-resolve
  - RULE-SET,Private,直连
  - RULE-SET,China-Domain,直连
  - RULE-SET,China-IP,直连,no-resolve
  - RULE-SET,Apple-CN,直连
  - RULE-SET,Direct,直连

  # ===== 广告 =====
  - RULE-SET,Ads,🛑 广告拦截

  # ===== Google / Android 系统 API：不要被 Gemini 误打进 AI 高敏链式出口 =====
  - DOMAIN,android.apis.google.com,🧑‍💻 开发-通用

  # ===== AI 高敏：固定美国住宅/ISP 落地，低流量高价值 =====
  - RULE-SET,OpenAI,🤖 AI-高敏固定
  - RULE-SET,Anthropic,🤖 AI-高敏固定
  - RULE-SET,Claude,🤖 AI-高敏固定
  # 不使用 blackmatrix7 Gemini.list 的 DOMAIN-SUFFIX,apis.google.com，避免 android.apis.google.com 等系统 API 误伤。
  - DOMAIN,ai.google.dev,🤖 AI-高敏固定
  - DOMAIN,makersuite.google.com,🤖 AI-高敏固定
  - DOMAIN,alkalimakersuite-pa.clients6.google.com,🤖 AI-高敏固定
  - DOMAIN,proactivebackend-pa.googleapis.com,🤖 AI-高敏固定
  - DOMAIN-SUFFIX,gemini.google.com,🤖 AI-高敏固定
  - DOMAIN-SUFFIX,bard.google.com,🤖 AI-高敏固定
  - DOMAIN-SUFFIX,deepmind.com,🤖 AI-高敏固定
  - DOMAIN-SUFFIX,deepmind.google,🤖 AI-高敏固定
  - DOMAIN-SUFFIX,generativeai.google,🤖 AI-高敏固定
  - DOMAIN-KEYWORD,generativelanguage,🤖 AI-高敏固定

  # ===== AI 普通：不消耗 Webshare 落地 =====
  - RULE-SET,Copilot,🧠 AI-普通
  - RULE-SET,Perplexity,🧠 AI-普通
  - RULE-SET,Groq,🧠 AI-普通
  - RULE-SET,HuggingFace,🧠 AI-普通

  # ===== 支付 / 身份：固定身份出口 =====
  - RULE-SET,PayPal,💳 支付-固定身份
  - RULE-SET,Stripe,💳 支付-固定身份
  - DOMAIN-SUFFIX,wise.com,💳 支付-固定身份
  - DOMAIN-SUFFIX,wiseborderless.com,💳 支付-固定身份
  - DOMAIN-SUFFIX,payoneer.com,💳 支付-固定身份
  - DOMAIN-SUFFIX,revolut.com,💳 支付-固定身份

  # ===== 虚拟货币：默认 SG/HK/JP/TW 稳定区，避免美国优先带来的交易所风控 =====
  - RULE-SET,Binance,🪙 交易所-稳定区
  - RULE-SET,OKX,🪙 交易所-稳定区
  - RULE-SET,Bybit,🪙 交易所-稳定区
  - RULE-SET,Crypto,🪙 交易所-稳定区

  # ===== TikTok：手动优先，自动兜底；国家可用性 + 速度优先，禁止 Webshare 落地 =====
  - RULE-SET,TikTok,🎵 TikTok-故转

  # ===== 视频：解锁优先，禁止 Webshare 落地 =====
  - RULE-SET,Netflix,🎬 视频-解锁
