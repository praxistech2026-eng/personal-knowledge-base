# ========================
# OpenClash / Mihomo 场景优化版 v9
# ========================
# 设计目标：
#   1. 格式统一：全部使用 block-style YAML，少用行内写法，方便 Obsidian / OpenClash 审查。
#   2. 节点筛选增强：按国家/地区扩展中文、英文、缩写、城市名和 emoji 图标。
#   3. 链式代理表达清楚：
#        - 「美国-故转」= 普通美国机场节点，手动优先、自动兜底。
#        - 「Webshare-美国-落地」= 最终目的站看到的美国住宅/ISP 出口，其 dialer-proxy 直接调用「美国-故转」。
#        - 「美国-住宅落地」= 对外暴露给 AI/支付策略选择的落地组。
#   4. Webshare 年流量有限，只用于低流量高风控场景：AI 高敏、支付、账号身份。
#   5. 视频、游戏、下载、系统更新、普通国外流量绝不走 Webshare 落地。
#   6. 保留用户认可的 fallback 行为：手动优先 → 手动不可用时自动兜底 → 手动恢复后切回。
# ========================


# 面板排序原则：
#   1. 最前面 = 日常需要你选择的业务策略组。
#   2. 中间 = 地区手动组；你只需要在这里指定每个地区的手动节点。
#   3. 最后 = 自动测速、故障转移、落地出口等底层组件；这些通常不用动。
# 说明：OpenClash/Mihomo YAML 本身不能真正折叠/隐藏策略组，只能通过顺序和命名降低干扰。

# ========================
# Mihomo Smart / LightGBM
# ========================
# 当前配置没有使用 smart 策略组；关闭 LightGBM 模型自动更新，避免模型下载 unexpected EOF 造成日志报错。
# 如果未来明确使用 smart 策略，再打开并保证 OpenClash 可以稳定访问 GitHub release 资源。
lgbm-auto-update: false

# ========================
# 机场节点订阅
# ========================
proxy-providers:
  Mitce:
    type: http
    url: "https://app.mitce.net/?sid=578426&token=***"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

  花云:
    type: http
    url: "https://api-huacloud.net/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS.yaml&url=https%3A%2F%2Fapi.xmancdn.net%2Fosubscribe.php%3Ftoken2%3Dy466zv7y-c2e6df1848mrfoy9pv%26sip002%3D1"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    # 用户在 OpenClash 订阅模式实测该链接可直连拉取；provider 更新不要再依赖 Mitce，避免启动/更新链路卡死。
    proxy: 直连

# ========================
# 静态代理 / 链式落地
# ========================
proxies:
  - name: 直连
    type: direct

  - name: 拒绝
    type: reject

  # Webshare 是最终「落地出口」。目的站看到的是 Webshare 的美国 IP。
  # dialer-proxy 指定的是「连接 Webshare 服务器之前」先走哪个代理组。
  # 实际链路：设备 → OpenClash → 🇺🇸 美国-故转(机场美国节点) → Webshare SOCKS5 → 目标网站。
  - name: Webshare-美国-落地
    type: socks5
    server: 208.66.74.168
    port: 5483
    username: jquairff
    password: tq3707vm3u6o
    udp: true
    dialer-proxy: 🇺🇸 美国-故转

