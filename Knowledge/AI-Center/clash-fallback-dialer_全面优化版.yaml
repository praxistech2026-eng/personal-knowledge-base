# -------------------- TUN 模块 --------------------
# 如需真正接管系统流量，请将以下改为 true
# 注意：auto-route: true 会让所有流量进入 Clash，需配合规则使用
tun:
  enable: false
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ============================================================
# 策略组架构
#
# 设计逻辑：
#   顶级策略组（用户直接选择）
#     └→ 场景策略组（按用途分流）
#         └→ 地域 fallback 组（手动+自动，保留 Fallback 设计）
#             └→ 手动组（include-all + filter，用户可选特定节点）
#             └→ 自动组（url-test，按延迟排序）
#             └→ 直接指定（如 Webshare、游戏平台专属节点）
#
# Fallback 核心逻辑（保留）：
#   默认：走手动节点（用户自选或默认不选）
#   手动节点不可用：自动切换到自动节点
#   手动节点恢复：自动切回手动节点
# ============================================================

proxy-groups:

  # ==========================================
  # 第一层：顶级全局选择（用户日常操作入口）
  # ==========================================

  # 所有节点——手动（用于用户在顶级临时指定某个节点）
  - name: 所有-手动
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"

  # 所有节点——自动选择（延迟最优）
  - name: 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(直连|拒绝)).)*$"

  # ==========================================
  # 第二层：场景策略组（用途分流）
  # ==========================================

  # ---- AI 服务（最高敏感，固定节点）----
  # OpenAI / Anthropic 等账号体系，IP频繁变化会触发风控
  # 走 Webshare 固定落地，不参与自动测速切换
  - name: AI-账号敏感
    type: select
    proxies:
      - Webshare-美国       # 固定IP，隔离在机场节点之外
      - 所有-手动
      - 所有-自动

  # Perplexity / Gemini / Copilot 等，对IP敏感度较低
  - name: AI-开发辅助
    type: select
    proxies:
      - 所有-手动
      - 所有-自动
      - 香港-故转
      - 日本-故转

  # ---- 支付/账号（高敏感，固定节点）----
  - name: 支付-账号
    type: select
    proxies:
      - Webshare-美国
      - 所有-手动
      - 所有-自动

  # ---- 视频流媒体（速度+解锁优先）----
