    type: fallback
    interval: 300
    lazy: false
    proxies:
      - Microsoft-手动
      - Microsoft-自动

  - name: Microsoft-手动
    type: select
    include-all: true
    filter: "(?=.*(Microsoft|Office|OneDrive|Outlook|Teams|🇺🇸.*Microsoft)).*$"

  - name: Microsoft-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(Microsoft|Office|OneDrive|Outlook|Teams)).*$"

  - name: Cloudflare-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - Cloudflare-手动
      - Cloudflare-自动

  - name: Cloudflare-手动
    type: select
    include-all: true
    filter: "(?=.*(Cloudflare|CF|1.1.1.1)).*$"

  - name: Cloudflare-自动
    type: url-test
    include-all: true
    tolerance: 30
    interval: 300
    filter: "(?=.*(Cloudflare|CF|1.1.1.1)).*$"

