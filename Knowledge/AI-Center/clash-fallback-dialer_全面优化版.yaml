# ============================================================
# Clash-Fallback 全面优化版
# 设计原则：
#   1. AI 服务：IP 纯净优先，固定节点，不频繁切换
#   2. 游戏平台：按发行商地域细分，Steam=美国，UBI=台湾
#   3. 视频流媒体：按平台+最优节点选择
#   4. 支付/账号：IP 纯净优先，固定高质量落地
#   5. Fallback 机制：默认手动 → 手动失效自动顶替 → 手动恢复切回
# ============================================================

# -------------------- 节点订阅 --------------------
proxy-providers:
  Mitce:
    url: "https://app.mitce.net/?sid=578426&token=***"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

  花云:
    url: "https://api-huacloud.net/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS.yaml&url=https%3A%2F%2Fapi.xmancdn.net%2Ffosubscribe.php%3Ftoken2%3Dy466zv7y-ac37957c86lwx99frk%26sip002%3D1"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

# -------------------- 静态代理（Webshare 固定落地） --------------------
