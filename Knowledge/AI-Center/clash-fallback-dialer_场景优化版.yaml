# ========================
# 策略组
# ========================
proxy-groups:
  # ===== 全节点选择：只包含机场订阅节点，不包含 Webshare 链式落地 =====
  - name: 所有-手动
    type: select
    use:
      - Mitce
      - 花云

  - name: 所有-自动
    type: url-test
    use:
      - Mitce
      - 花云
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # ===== 地域组：Fallback = 手动优先，自动兜底，手动恢复后切回 =====
  - name: 美国-故转
    type: fallback
    proxies:
      - 美国-手动
      - 美国-自动
    url: https://www.gstatic.com/generate_204
    interval: 300
    lazy: false

  - name: 美国-手动
    type: select
    use: [Mitce, 花云]
    filter: "(?i)(美国|美|US|United States|America|洛杉矶|纽约|圣何塞|西雅图|达拉斯|波特兰|🇺🇸)"

