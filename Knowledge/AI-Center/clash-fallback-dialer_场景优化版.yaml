# ========================
# OpenClash / Mihomo 场景优化版
# 核心原则：
#   1. 链式落地 Webshare-美国 全年仅 250G，只用于低流量、高风控敏感场景：AI 高敏、支付、账号身份。
#   2. 视频、游戏、下载、系统更新、普通国外流量绝不走链式落地。
#   3. 保留「手动优先 + 自动兜底 + 恢复后切回手动」的 fallback 结构。
#   4. 规则源优先使用 MetaCubeX/meta-rules-dat 与 blackmatrix7/ios_rule_script。
# ========================

# ========================
# 机场节点订阅
# ========================
proxy-providers:
  Mitce:
    type: http
    url: "https://app.mitce.net/?sid=578426&token=***"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

  花云:
    type: http
    url: "https://api-huacloud.net/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS.yaml&url=https%3A%2F%2Fapi.xmancdn.net%2Fosubscribe.php%3Ftoken2%3Dy466zv7y-ac37957c86lwx99frk%26sip002%3D1"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

# ========================
# 静态代理
# ========================
proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

  # Webshare 是「链式落地出口」，目的站看到的是 Webshare 的美国 IP。
  # 只有 AI 高敏 / 支付 / 身份类低流量场景会引用它。
  - name: Webshare-美国
    type: socks5
    server: 208.66.74.168
    port: 5483
    username: jquairff
    password: tq3707vm3u6o
    udp: true
    dialer-proxy: 美国-链式前置

# ========================
# 端口与基础设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: "123456"
ipv6: true

# ========================
# DNS
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 223.5.5.5
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - https://dns.google/dns-query
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.ynhtbank.com
    - +.qeayr.cn
    - +.saojc.xyz
    - +.sssyun.xyz
    - +.dler.cloud
    - +.0tk8a3a1q4t94dler.com
    - +.aerianas.top
    - +.gptacg.top
    - +.wxda.net

# ========================
# TUN
# ========================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 规则集模板
# ========================
rule-anchor:
  domain-mrs: &domain-mrs {type: http, interval: 86400, behavior: domain, format: mrs}
  ip-mrs: &ip-mrs {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  classical: &classical {type: http, interval: 86400, behavior: classical, format: text}

